.logo em{font-style:normal;color:var(--accent)}

.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:28px 0}

.fbtn:hover,.fbtn.on{color:var(--accent);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.sec-hd{font-size:10px;letter-spacing:4px;font-weight:700;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sec-hd::after{content:"";flex:1;height:1px;background:var(--glass-b)}
.group-section{margin-bottom:36px}
.group-header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:16px;background:var(--glass);border:1px solid var(--glass-b);margin-bottom:12px;backdrop-filter:blur(16px)}
.group-letter{font-size:40px;font-weight:900;color:var(--accent);line-height:1;min-width:32px;text-align:center}
.group-teams{display:flex;flex-wrap:wrap;gap:6px}
.team-tag{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--glass-b)}
.match-card{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:6px;background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;transition:all .2s;backdrop-filter:blur(12px)}
.match-card:hover{background:rgba(255,255,255,.07);transform:translateX(4px)}

.match-date-col{min-width:88px}
.match-date{font-size:13px;font-weight:700}
.match-time{font-size:11px;color:var(--muted)}
.cd-sm{font-size:11px;color:var(--cyan);margin-top:2px;font-variant-numeric:tabular-nums}
.vs-section{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.team-block{flex:1;text-align:center}
.team-flag{font-size:22px;display:block;margin-bottom:2px}
.team-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vs-badge{font-size:11px;font-weight:800;color:var(--muted);padding:4px 10px;border:1px solid var(--glass-b);border-radius:6px}
.status-pill{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);color:var(--cyan);white-space:nowrap}

    {id:"M067",date:"17 Jun",time:"04:00",teamA:"England",flagA:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",teamB:"Croatia",flagB:"🇭🇷",venue:"MetLife Stadium",city:"New York"},
    {id:"M068",date:"18 Jun",time:"01:30",teamA:"Ghana",flagA:"🇬🇭",teamB:"Panama",flagB:"🇵🇦",venue:"Estadio Azteca",city:"Mexico City"},
    {id:"M069",date:"22 Jun",time:"01:30",teamA:"England",flagA:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",teamB:"Ghana",flagB:"🇬🇭",venue:"Rose Bowl",city:"LA"},
    {id:"M070",date:"22 Jun",time:"04:00",teamA:"Panama",flagA:"🇵🇦",teamB:"Croatia",flagB:"🇭🇷",venue:"Arrowhead",city:"Kansas City"},
    {id:"M071",date:"26 Jun",time:"00:00",teamA:"Croatia",flagA:"🇭🇷",teamB:"Ghana",flagB:"🇬🇭",venue:"Lincoln Financial",city:"Philadelphia"},
    {id:"M072",date:"26 Jun",time:"00:00",teamA:"Panama",flagA:"🇵🇦",teamB:"England",flagB:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",venue:"Levi's Stadium",city:"San Jose"},
  ]},
];

let cur = "all";

function buildFilters(){
  const letters = GROUPS.map(g => g.letter);
  const btns = [["all","All Matches"],...letters.map(l => [l, "Group "+l])];
  document.getElementById("filters").innerHTML = btns.map(([v,lbl]) =>
    `<button class="fbtn${v===cur?" on":""}" onclick="filter('${v}',this)">${lbl}</button>`
  ).join("");
}

function filter(v, btn){
  cur = v;
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  buildSchedule();
}

function buildSchedule(){
  const root = document.getElementById("schedule-root");
  root.innerHTML = "";
  GROUPS.forEach(g => {
    if(cur !== "all" && g.letter !== cur) return;
    const sec = document.createElement("div");
    sec.className = "group-section";
    const teamTags = g.teams.map(t => `<span class="team-tag">${t.flag} ${t.name}</span>`).join("");
    sec.innerHTML = `<div class="group-header">
      <div class="group-letter">${g.letter}</div>
      <div class="group-teams">${teamTags}</div>
    </div>`;
    g.matches.forEach(m => {
      const [day,mon] = m.date.split(" ");
      const [h,min] = m.time.split(":");
      const utcH = (parseInt(h)-5+24)%24;
      const utcM = (parseInt(min)-30+60)%60;
      const mnth = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"}[mon]||"06";
      const target = new Date(`2026-${mnth}-${day.padStart(2,"0")}T${String(utcH).padStart(2,"0")}:${String(utcM).padStart(2,"0")}:00Z`);
      const card = document.createElement("div");
      card.className = "match-card";
      card.innerHTML = `
        <div class="match-id">${m.id}</div>
        <div class="match-date-col">
          <div class="match-date">${m.date}</div>
          <div class="match-time">${m.time} IST</div>
          <div class="cd-sm" id="cd-${m.id}">—</div>
        </div>
        <div class="vs-section">
          <div class="team-block"><span class="team-flag">${m.flagA}</span><div class="team-name">${m.teamA}</div></div>
          <div class="vs-badge">VS</div>
          <div class="team-block"><span class="team-flag">${m.flagB}</span><div class="team-name">${m.teamB}</div></div>
        </div>
        <span class="status-pill">📅 Upcoming</span>
        <div class="venue-col"><div>${m.venue}</div><div style="font-size:10px;margin-top:2px;color:#475569">${m.city}</div></div>
      `;
      const cdEl = card.querySelector(`#cd-${m.id}`);
      function tick(){
        const diff = target - new Date();
        if(diff<=0){cdEl.textContent="🔴 LIVE / FT";return;}
        const d=Math.floor(diff/86400000),h2=Math.floor(diff%86400000/3600000),mn=Math.floor(diff%3600000/60000);
        cdEl.textContent = d>0?`in ${d}d ${h2}h`:`in ${h2}h ${mn}m`;
      }
      tick(); setInterval(tick,60000);
      sec.appendChild(card);
    });
    root.appendChild(sec);
  });
}

buildFilters();
buildSchedule();
</script>
</body>
</html>
