<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(30,80,180,0.18),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(180,30,60,0.12),transparent 60%);pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 16px 60px;}
header{text-align:center;padding:36px 20px 20px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,7vw,64px);letter-spacing:4px;background:linear-gradient(135deg,#FFD700,#FFA500,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.subtitle{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:2px;text-transform:uppercase;}
.nav-tabs{display:flex;gap:8px;justify-content:center;margin:20px 0 28px;flex-wrap:wrap;}
.nav-tab{padding:9px 22px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:0.5px;text-decoration:none;border:1px solid var(--border);color:var(--muted);transition:all .2s;background:rgba(255,255,255,0.03);}
.nav-tab:hover,.nav-tab.active{color:var(--gold);border-color:var(--gold);background:rgba(255,215,0,0.08);}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.filter-btn{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:700;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,0.03);cursor:pointer;transition:all .2s;letter-spacing:0.5px;}
.filter-btn.on{color:var(--gold);border-color:var(--gold);background:rgba(255,215,0,0.1);}

/* GROUP HEADERS */
.group-section{margin-bottom:32px;}
.group-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:14px 18px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.group-letter{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);line-height:1;width:36px;text-align:center;}
.group-teams-wrap{flex:1;}
.group-teams-row{display:flex;flex-wrap:wrap;gap:6px;}
.team-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);}
.team-tag.fantasy{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.35);color:var(--gold);}
.group-badge{font-size:10px;font-weight:700;background:rgba(255,215,0,0.12);color:var(--gold);padding:3px 8px;border-radius:4px;letter-spacing:1px;white-space:nowrap;}

/* MATCH CARDS */
.match-card{display:flex;align-items:center;padding:14px 18px;margin-bottom:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;gap:12px;transition:all .2s;position:relative;overflow:hidden;}
.match-card:hover{background:var(--card-hov);transform:translateX(3px);}
.match-card.fantasy-match{border-color:rgba(255,215,0,0.2);}
.match-card.fantasy-match::before{content:'в­ђ';position:absolute;right:12px;top:10px;font-size:12px;}
.match-num{font-size:11px;color:var(--muted);min-width:36px;text-align:center;font-family:'Rajdhani',sans-serif;font-weight:700;}
.match-date-col{min-width:90px;}
.match-date{font-size:13px;font-weight:700;}
.match-time{font-size:11px;color:var(--muted);}
.vs-section{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;}
.team-block{flex:1;text-align:center;}
.team-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-flag{font-size:22px;display:block;margin-bottom:2px;}
.vs-badge{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);padding:4px 10px;border:1px solid var(--border);border-radius:6px;white-space:nowrap;}
.score-badge{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold);padding:4px 10px;border:1px solid rgba(255,215,0,0.3);border-radius:6px;white-space:nowrap;background:rgba(255,215,0,0.08);}
.status-pill{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.status-up{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;}
.status-live{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);color:#f87171;animation:pulse 1s ease-in-out infinite;}
.status-ft{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#4ade80;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.venue-col{font-size:11px;color:var(--muted);min-width:100px;text-align:right;}
.venue-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* COUNTDOWN TIMER */
.countdown-sm{font-size:11px;color:#60a5fa;margin-top:2px;font-family:monospace;}

.section-label{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:4px;}
.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.footer a{color:var(--gold);text-decoration:none;}
@media(max-width:600px){
  .match-card{flex-wrap:wrap;}
  .venue-col{display:none;}
  .team-name{font-size:12px;}
}
</style>

const FANTASY_TEAMS = ["Portugal","Argentina","England","Spain","Germany","France","Brazil","Netherlands"];
const FANTASY_PLAYERS = {
  "Portugal":"Budhya рџ‡µрџ‡№","Argentina":"Ambu рџ‡¦рџ‡·","England":"Vini рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї",
  "Spain":"Baby рџ‡Єрџ‡ё","Germany":"Abs рџ‡©рџ‡Є","France":"Anna рџ‡«рџ‡·",
  "Brazil":"Umaga рџ‡§рџ‡·","Netherlands":"PR рџ‡ірџ‡±"
};

let currentFilter = "all";

function buildSchedule(){
  const root = document.getElementById("schedule-root");
  root.innerHTML = "";

  GROUPS.forEach(g => {
    // Hide group if filtered and not matching
    if(currentFilter !== "all"){
      if(currentFilter === "fantasy" && !g.fantasy) return;
      if(currentFilter.startsWith("G") && g.id !== currentFilter) return;
    }

    // Group header
    const hasFantasy = g.teams.some(t => FANTASY_TEAMS.includes(t.name));
    const playerTags = g.teams
      .filter(t => FANTASY_PLAYERS[t.name])
      .map(t => `<span class="team-tag fantasy">${FANTASY_PLAYERS[t.name]}</span>`)
      .join("");

    const teamTags = g.teams.map(t =>
      `<span class="team-tag${FANTASY_TEAMS.includes(t.name) ? " fantasy" : ""}">${t.flag} ${t.name}</span>`
    ).join("");

    const section = document.createElement("div");
    section.className = "group-section";
    section.dataset.group = g.id;

    section.innerHTML = `
      <div class="group-header">
        <div class="group-letter">${g.letter}</div>
        <div class="group-teams-wrap">
          <div class="group-teams-row">${teamTags}</div>
          ${playerTags ? `<div class="group-teams-row" style="margin-top:6px">${playerTags}</div>` : ""}
        </div>
        ${hasFantasy ? '<span class="group-badge">в­ђ FANTASY</span>' : ''}
      </div>
    `;

    // Match cards
    g.matches.forEach(m => {
      const isFantasy = m.fantasy || false;
      const statusHtml = `<span class="status-pill status-up">рџ“… Upcoming</span>`;
      const matchDate = parseMatchDate(m.date);
      const countdownHtml = matchDate ? `<div class="countdown-sm" id="cd-${m.id}">вЂ”</div>` : "";

      const card = document.createElement("div");
      card.className = `match-card${isFantasy ? " fantasy-match" : ""}`;
      card.innerHTML = `
        <div class="match-num">${m.id}</div>
        <div class="match-date-col">
          <div class="match-date">${m.date}</div>
          <div class="match-time">${m.time} IST</div>
          ${countdownHtml}
        </div>
        <div class="vs-section">
          <div class="team-block">
            <span class="team-flag">${m.flagA}</span>
            <div class="team-name">${m.teamA}</div>
          </div>
          <div class="vs-badge">VS</div>
          <div class="team-block">
            <span class="team-flag">${m.flagB}</span>
            <div class="team-name">${m.teamB}</div>
          </div>
        </div>
        ${statusHtml}
        <div class="venue-col">
          <div class="venue-name">${m.venue}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${m.city}</div>
        </div>
      `;
      section.appendChild(card);
    });

    root.appendChild(section);
  });

  // Start countdowns
  startCountdowns();
}

function parseMatchDate(dateStr){
  // e.g. "11 Jun" в†’ Date object in 2026
  try{
    return new Date(`${dateStr} 2026 ${" "} UTC`);
  }catch(e){ return null; }
}

function startCountdowns(){
  GROUPS.forEach(g => g.matches.forEach(m => {
    const el = document.getElementById(`cd-${m.id}`);
    if(!el) return;
    try{
      const [day,mon] = m.date.split(" ");
      const [h,min]   = m.time.split(":");
      // IST = UTC+5:30, so subtract to get UTC
      const utcH = (parseInt(h) - 5 + 24) % 24;
      const utcM = (parseInt(min) - 30 + 60) % 60;
      const target = new Date(`2026-${monthNum(mon)}-${day.padStart(2,"0")}T${String(utcH).padStart(2,"0")}:${String(utcM).padStart(2,"0")}:00Z`);
      updateCountdown(el, target);
      setInterval(() => updateCountdown(el, target), 60000);
    }catch(e){}
  }));
}

function updateCountdown(el, target){
  const now  = new Date();
  const diff = target - now;
  if(diff <= 0){ el.textContent = "рџ”ґ LIVE / FT"; return; }
  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff%86400000/3600000);
  const m = Math.floor(diff%3600000/60000);
  el.textContent = d > 0 ? `in ${d}d ${h}h` : `in ${h}h ${m}m`;
}

function monthNum(mon){
  return{Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
         Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"}[mon] || "06";
}

function filterMatches(f, btn){
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  buildSchedule();
}

buildSchedule();
