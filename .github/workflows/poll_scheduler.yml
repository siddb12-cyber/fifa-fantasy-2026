name: FIFA Fantasy — Poll Scheduler
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs every 30 minutes, 24/7 — GitHub's servers, no machine needed
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send poll immediately (bypasses timing)'
        type: boolean
        default: false
      force_match:
        description: 'Match ID to force (e.g. M001). Leave blank for next due match.'
        type: string
        default: ''
      trial_mode:
        description: 'Trial mode (uses trial_matches.json). Uncheck only on June 12 to go live.'
        type: boolean
        default: true

jobs:
  send-polls:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth pytz

      - name: Run Poll Bot
        env:
          TELEGRAM_TOKEN:          ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TEST_MODE:               'false'
          FORCE_SEND:              ${{ github.event.inputs.force_send || 'false' }}
          FORCE_MATCH:             ${{ github.event.inputs.force_match || '' }}
          TRIAL_MODE:              ${{ github.event.inputs.trial_mode || 'true' }}
        run: python scripts/poll_bot.py
